# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. crosslink)
component: instrumentation

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Use the official OpenTelemetry injector release instead of the custom injector shim for auto-instrumentation.

# One or more tracking issues related to the change
issues: [7581]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Auto-instrumentation configuration files moved from `/etc/splunk/zeroconfig/` to
  `/etc/opentelemetry/injector/` (e.g. `default_env.conf`, `injector.conf`), matching the
  layout expected by the official OpenTelemetry injector.
  These configuration files now support environment variables with both `OTEL_` and
  `SPLUNK_` prefixes (e.g. `SPLUNK_METRICS_ENABLED`, `SPLUNK_PROFILER_ENABLED`,
  `SPLUNK_PROFILER_MEMORY_ENABLED`).
  .NET auto-instrumentation is now also supported on arm64, in addition to amd64.
