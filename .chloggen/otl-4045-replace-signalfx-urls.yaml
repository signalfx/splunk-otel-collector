# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: breaking

# The name of the component, or a single word describing the area of concern, (e.g. crosslink)
component: installer

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Update installer scripts, packaging, and deployment tooling to use `*.observability.splunkcloud.com` URLs instead of `*.signalfx.com`.

# One or more tracking issues related to the change
issues: [7413]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The default API and ingest endpoint URLs produced by installers and deployment tools have been updated:
  - `https://api.<realm>.signalfx.com` → `https://api.<realm>.observability.splunkcloud.com`
  - `https://ingest.<realm>.signalfx.com` → `https://ingest.<realm>.observability.splunkcloud.com`
  - `https://ingest.<realm>.signalfx.com/v1/log` → `https://ingest.<realm>.observability.splunkcloud.com/v1/log`

  **Migration Notes — Proxy and Firewall Configuration:**
  If you have firewall rules or proxy allowlists scoped to `*.signalfx.com`, update them to allow
  `*.observability.splunkcloud.com`, or the specific realm-scoped hostnames:
  - `api.<realm>.observability.splunkcloud.com`
  - `ingest.<realm>.observability.splunkcloud.com`

  **Keeping legacy `*.signalfx.com` endpoints:**
  Pass explicit URL flags to the installer (replace `<realm>` with your realm, e.g. `us0`):

  Linux (`install.sh`):
  ```
  --api-url https://api.<realm>.signalfx.com
  --ingest-url https://ingest.<realm>.signalfx.com
  --hec-url https://ingest.<realm>.signalfx.com/v1/log
  ```

  Windows (`install.ps1`):
  ```
  -api_url https://api.<realm>.signalfx.com
  -ingest_url https://ingest.<realm>.signalfx.com
  -hec_url https://ingest.<realm>.signalfx.com/v1/log
  ```

  If you already set `SPLUNK_API_URL`, `SPLUNK_INGEST_URL`, or `SPLUNK_HEC_URL` explicitly in your
  deployment, no change is required — those values override the installer defaults. The legacy
  `*.signalfx.com` endpoints remain available during the transition period.
