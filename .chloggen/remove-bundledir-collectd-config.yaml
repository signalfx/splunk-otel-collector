# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: breaking

# The name of the component, or a single word describing the area of concern, (e.g. crosslink)
component: smartagentextension

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Remove `collectd` configuration block and `bundleDir` default from the Smart Agent Extension.

# One or more tracking issues related to the change
issues: [7513]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The `collectd` configuration block (including `configDir`, `logLevel`, `intervalSeconds`, etc.)
  has been removed from the Smart Agent Extension as the collectd subprocess no longer exists.
  The `bundleDir` field is retained for explicit legacy Smart Agent compatibility but no longer
  defaults to `SPLUNK_BUNDLE_DIR`. Configurations referencing the `collectd` block must be updated.
