# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: breaking

# The name of the component, or a single word describing the area of concern, (e.g. crosslink)
component: jmxreceiver

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Remove the `jmx` receiver, which has been deprecated upstream. This also removes the `jmx/cassandra` auto-discovery integration and the bundled JMX Metrics Gatherer JAR from all packaging artifacts (Docker images, MSI, DEB, RPM, tar).

# One or more tracking issues related to the change
issues: [7798]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  This change removes the `jmx` receiver, which has been deprecated upstream. As a result, the `jmx/cassandra` auto-discovery integration and the bundled JMX Metrics Gatherer JAR are also removed from all packaging artifacts (Docker images, MSI, DEB, RPM, tar).|
  To continue monitoring a Cassandra instance (or any other JMX target) via JMX, use the standalone
  [`jmx-scraper`](https://github.com/open-telemetry/opentelemetry-java-contrib/tree/main/jmx-scraper)
  from opentelemetry-java-contrib instead. Point it at the collector's OTLP receiver by setting
  `OTEL_EXPORTER_OTLP_ENDPOINT` (or `otel.exporter.otlp.endpoint`) to the collector's listening OTLP
  gRPC interface (defaults to port 4317), and set `otel.jmx.target.system` to `cassandra`.
