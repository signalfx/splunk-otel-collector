name: Fetch OBI source
description: |
  Downloads the OBI release tarball (which includes all pre-generated BPF files)
  and extracts it to third_party/opentelemetry-ebpf-instrumentation. The tarball
  is cached by OBI version so re-runs are instant when the version has not changed.
  No BPF toolchain (clang, llvm-strip, bpf2go) is required.

inputs:
  obi-version:
    description: OBI version to fetch (e.g., v0.6.0)
    default: v0.6.0

runs:
  using: composite
  steps:
    - name: Cache OBI source
      id: cache-obi
      uses: actions/cache@v4
      with:
        path: third_party/opentelemetry-ebpf-instrumentation
        key: obi-source-${{ inputs.obi-version }}

    - name: Fetch OBI source tarball (Linux/macOS)
      if: steps.cache-obi.outputs.cache-hit != 'true' && runner.os != 'Windows'
      shell: bash
      env:
        OBI_VERSION: ${{ inputs.obi-version }}
      run: |
        mkdir -p third_party/opentelemetry-ebpf-instrumentation
        curl -fL \
          "https://github.com/open-telemetry/opentelemetry-ebpf-instrumentation/releases/download/${OBI_VERSION}/obi-${OBI_VERSION}-source-generated.tar.gz" \
          | tar xz --strip-components=1 -C third_party/opentelemetry-ebpf-instrumentation

    - name: Fetch OBI source tarball (Windows)
      if: steps.cache-obi.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: pwsh
      env:
        OBI_VERSION: ${{ inputs.obi-version }}
      run: |
        $tarball = "obi-${env:OBI_VERSION}-source-generated.tar.gz"
        $url = "https://github.com/open-telemetry/opentelemetry-ebpf-instrumentation/releases/download/${env:OBI_VERSION}/${tarball}"
        $dest = "third_party/opentelemetry-ebpf-instrumentation"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        curl.exe -fL -o $tarball $url
        tar xzf $tarball --strip-components=1 -C $dest
        Remove-Item $tarball
