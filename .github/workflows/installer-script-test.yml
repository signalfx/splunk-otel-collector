name: installer-script-test

# Only run tests for main branch or if the PR has relevant changes
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/installer-script-test.yml'
      - '.github/workflows/reusable-compile.yml'
      - '.github/workflows/reusable-build-package.yml'
      - '.github/workflows/reusable-build-instrumentation-package.yml'
      - 'cmd/otelcol/**'
      - 'internal/**'
      - 'instrumentation/**'
      - 'packaging/fpm/**'
      - 'packaging/installer/install.sh'
      - 'packaging/tests/instrumentation/**'
      - 'packaging/tests/helpers/**'
      - 'packaging/tests/images/**'
      - 'packaging/tests/installer_test.py'
      - 'packaging/tests/requirements.txt'
      - 'Makefile'
      - 'Makefile.Common'
      - '!**.md'

concurrency:
  group: installer-script-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile:
    strategy:
      matrix:
        SYS_BINARIES: [ "binaries-linux_amd64", "binaries-linux_arm64" ]
    uses: ./.github/workflows/reusable-compile.yml
    with:
      SYS_BINARY: ${{ matrix.SYS_BINARIES }}

  build-package:
    needs: [cross-compile]
    strategy:
      matrix:
        SYS_PACKAGE: [ "deb", "rpm" ]
        ARCH: [ "amd64", "arm64" ]
      fail-fast: false
    uses: ./.github/workflows/reusable-build-package.yml
    with:
      SYS_PACKAGE: ${{ matrix.SYS_PACKAGE }}
      ARCH: ${{ matrix.ARCH }}

  build-instrumentation-package:
    strategy:
      matrix:
        SYS_PACKAGE: [ "deb", "rpm" ]
        ARCH: [ "amd64", "arm64" ]
      fail-fast: false
    uses: ./.github/workflows/reusable-build-instrumentation-package.yml
    with:
      SYS_PACKAGE: ${{ matrix.SYS_PACKAGE }}
      ARCH: ${{ matrix.ARCH }}

  installer-test-matrix:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get distros
        id: get-matrix
        run: |
          # create test matrix for distro images and archs
          dockerfiles=$(find packaging/tests/images/deb/Dockerfile.* packaging/tests/images/rpm/Dockerfile.* | cut -d '.' -f2- | sort -u)
          if [ -z "$dockerfiles" ]; then
            echo "Failed to get dockerfiles from packaging/tests/images!" >&2
            exit 1
          fi
          distro=$(for d in $dockerfiles; do echo -n "\"$d\","; done)
          arch='"amd64","arm64"'
          instrumentation='"none","preload","systemd"'
          matrix="{\"DISTRO\": [${distro%,}], \"ARCH\": [${arch}], \"INSTRUMENTATION\": [${instrumentation}]}"
          echo "$matrix" | jq
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

  linux-installer-script-test:
    runs-on: ubuntu-24.04${{ matrix.ARCH == 'arm64' && '-arm' || '' }}
    timeout-minutes: 90
    needs: [build-package, build-instrumentation-package, installer-test-matrix]
    strategy:
      matrix: ${{ fromJSON(needs.installer-test-matrix.outputs.matrix) }}
      fail-fast: false
    env:
      PYTHON_VERSION: '3.13'
      PIP_VERSION: '24.2'
      REQUIREMENTS_PATH: "packaging/tests/requirements.txt"
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get package type for ${{ matrix.DISTRO }}
        run: |
          for pkg in "deb" "rpm"; do
            if [[ -f "packaging/tests/images/${pkg}/Dockerfile.${{ matrix.DISTRO }}" ]]; then
              echo "SYS_PACKAGE=${pkg}" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "Unknown distro '${{ matrix.DISTRO }}'!"
          exit 1

      - name: Download ${{ env.SYS_PACKAGE }} ${{ matrix.ARCH }} package built from source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.SYS_PACKAGE }}-${{ matrix.ARCH }}-package
          path: ./dist

      - name: Set LOCAL_COLLECTOR_PACKAGE
        run: |
          package_path=$(find ./dist -maxdepth 1 -name "splunk-otel-collector*.${{ env.SYS_PACKAGE }}" | head -n 1)
          if [ -z "$package_path" ]; then
            echo "Failed to find a built splunk-otel-collector .${{ env.SYS_PACKAGE }} package in ./dist!" >&2
            exit 1
          fi
          echo "LOCAL_COLLECTOR_PACKAGE=$(realpath "$package_path")" >> "$GITHUB_ENV"

      - name: Download splunk-otel-auto-instrumentation ${{ env.SYS_PACKAGE }} ${{ matrix.ARCH }} package built from source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: splunk-otel-auto-instrumentation-${{ matrix.ARCH }}-${{ env.SYS_PACKAGE }}
          path: ./instrumentation-dist

      - name: Set LOCAL_INSTRUMENTATION_PACKAGE
        run: |
          package_path=$(find ./instrumentation-dist -maxdepth 1 -name "splunk-otel-auto-instrumentation*.${{ env.SYS_PACKAGE }}" | head -n 1)
          if [ -z "$package_path" ]; then
            echo "Failed to find a built splunk-otel-auto-instrumentation .${{ env.SYS_PACKAGE }} package in ./instrumentation-dist!" >&2
            exit 1
          fi
          echo "LOCAL_INSTRUMENTATION_PACKAGE=$(realpath "$package_path")" >> "$GITHUB_ENV"

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.REQUIREMENTS_PATH }}

      - name: Install pytest
        run: |
          if which pip; then
              pip install --upgrade 'pip==${{ env.PIP_VERSION }}'
          else
              curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py
              python get-pip.py 'pip==${{ env.PIP_VERSION }}'
          fi
          pip install -r "${{ env.REQUIREMENTS_PATH }}"

      - name: Test installer script
        id: pytest
        continue-on-error: true
        run: |
          distro="${{ matrix.DISTRO }}"
          if [[ "${{ matrix.INSTRUMENTATION }}" = "none" ]]; then
            tests="$distro and ${{ matrix.ARCH }} and not instrumentation"
          else
            tests="$distro and ${{ matrix.ARCH }} and ${{ matrix.INSTRUMENTATION }}"
          fi
          python3 -u -m pytest -s --verbose -k "$tests" \
            packaging/tests/installer_test.py

      # networking, running systemd in containers, etc., can be flaky
      - name: Re-run failed tests
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: |
          distro="${{ matrix.DISTRO }}"
          if [[ "${{ matrix.INSTRUMENTATION }}" = "none" ]]; then
            tests="$distro and ${{ matrix.ARCH }} and not instrumentation"
          else
            tests="$distro and ${{ matrix.ARCH }} and ${{ matrix.INSTRUMENTATION }}"
          fi
          python3 -u -m pytest -s --verbose -k "$tests" \
            --last-failed \
            packaging/tests/installer_test.py
