name: "otelcol-fips"

on:
  push:
    branches:
      - otelcol-fips

concurrency:
  group: otelcol-fips-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.21.12"

jobs:
  otelcol-fips:
    runs-on: ${{ matrix.RUNNER }}
    strategy:
      matrix:
        include:
          - TARGET: linux_amd64
            RUNNER: ubuntu-20.04
          - TARGET: linux_arm64
            RUNNER: otel-arm64
          - TARGET: windows_amd64
            RUNNER: ubuntu-20.04
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: '**/go.sum'
      - run: make binaries-${{ matrix.TARGET }}
        env:
          FIPSONLY: yes
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: otelcol-fips-${{ matrix.TARGET }}
          path: ./bin/*
