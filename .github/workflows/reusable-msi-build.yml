name: msi-build

on:
  workflow_call:
    inputs:
      ARCH:
        required: true
        type: string
    outputs:
      version:
        description: "The MSI version"
        value: ${{ jobs.msi-build.outputs.version }}

env:
  GO_VERSION: 1.25.8

jobs:
  msi-build:
    runs-on: ${{ inputs.ARCH == 'arm64' && 'windows-11-arm' || 'windows-2022' }}
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get MSI version
        id: get-version
        shell: bash
        run: |
          # Get base version from git and strip the v prefix
          VERSION=$(git describe --match "v[0-9]*" HEAD | sed 's/^v//' | sed 's/-g[0-9a-f]*$//')
          
          # MSI version must be N.N.N or N.N.N.N format (numeric only)
          # Convert 0.140.0-60 to 0.140.0.60 (replace dash with dot)
          VERSION="${VERSION//-/.}"
          
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Wix
        run: dotnet tool restore

      - name: Downloading binaries-windows_${{ inputs.ARCH }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: binaries-windows_${{ inputs.ARCH }}
          path: ./bin

      - name: Downloading agent-bundle-windows
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: agent-bundle-windows_${{ inputs.ARCH }}
          path: ./dist

      - name: Downloading msi-custom-actions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: msi-custom-actions
          path: ./packaging/msi/SplunkCustomActions/bin/Release

      - name: Build MSI
        shell: bash
        run: |
          # Build script parameters
          VERSION="${{ steps.get-version.outputs.version }}"
          JMX_METRIC_GATHERER_RELEASE=$(cat packaging/jmx-metric-gatherer-release.txt)

          ./packaging/msi/build.sh --version "$VERSION" --jmx-metric-gatherer-release "$JMX_METRIC_GATHERER_RELEASE" --arch "${{ inputs.ARCH }}"

      - name: Uploading msi build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: msi-build-${{ inputs.ARCH }}
          path: ./dist/*.msi
