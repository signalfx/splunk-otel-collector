[files]
extend-exclude = [
  "docker/httpd_basicauth/httpd.conf"
  "internal/signalfx-agent/*",
  "*.sum",
  "*.mod",
]

[default.extend-words]
# Don't correct these words as they're covered by spellcheck
AKS = "AKS"
facter = "facter"
Hashi = "Hashi"
nam = "nam"
ot = "ot"
retransmited = "retransmited"
tha = "tha"
wqs = "wqs"

[default]
extend-ignore-re = [
    # Ignore lines that are purposely ignored
    "^.*codespell:ignore.*$"
]