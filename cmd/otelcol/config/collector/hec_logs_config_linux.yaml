# Default configuration file for logs collection on Linux.
#
# If the collector is installed without the Linux installer script, the following
# environment variables are required to be manually defined or configured below:
# - SPLUNK_LOGS_TOKEN: The Splunk HEC authentication token
# - SPLUNK_LOGS_URL: The Splunk HEC endpoint URL, e.g. https://http-inputs-acme.splunkcloud.com/services/collector
# - SPLUNK_MEMORY_LIMIT_MIB: 90% of memory allocated
#
# The following environment variables are optional:
# - SPLUNK_FILE_STORAGE_EXTENSION_PATH: Path to directory used to store file offsets for filelog receivers,
#   allowing receivers to resume after a collector restart. Must be writable by the collector.
#   default: /var/lib/otelcol/filelogs
# - SPLUNK_LOGS_INDEX: Splunk index to send logs to. If not set, the default index configured
#   on the logs token will be used.

extensions:
  health_check:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:13133"
  file_storage/filelogs:
    directory: "${env:SPLUNK_FILE_STORAGE_EXTENSION_PATH:-/var/lib/otelcol/filelogs}"
    fsync: true
    compaction:
      on_start: true
      directory: /tmp/
    create_directory: true

receivers:
  # Matches TA stanza: [monitor:///etc]
  # whitelist=(\.(conf|cfg|ini|init|cf|cnf|profile|rc|rules|tab|login)$|(config|shrc|tab|policy)$|^ifcfg)
  filelog/etc:
    include:
      - /etc/*.conf
      - /etc/*.cfg
      - /etc/*.ini
      - /etc/*.init
      - /etc/*.cf
      - /etc/*.cnf
      - /etc/*.profile
      - /etc/*.rc
      - /etc/*.rules
      - /etc/*.tab
      - /etc/*.login
      - /etc/*config
      - /etc/*shrc
      - /etc/*policy
      - /etc/ifcfg*
    include_file_path: true
    include_file_name: true
    start_at: beginning
    force_flush_period: 500ms
    multiline:
      line_start_pattern: '^THIS_PATTERN_WILL_NEVER_MATCH_ANYTHING$'
    operators:
      - from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
        type: move
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: linux:etc

  # Matches TA stanzas: [monitor:///var/log] and [monitor:///var/adm]
  # whitelist=(\.log|log$|messages|secure|auth|mesg$|cron$|acpid$|\.out)
  # blacklist=(lastlog|anaconda\.syslog)
  filelog/varlog:
    include:
      - /var/log/*.log
      - /var/log/*log
      - /var/log/*messages*
      - /var/log/*secure*
      - /var/log/*auth*
      - /var/log/*mesg
      - /var/log/*cron
      - /var/log/*acpid
      - /var/log/*.out
      - /var/adm/*.log
      - /var/adm/*messages*
    exclude:
      - /var/log/lastlog
      - /var/log/anaconda.syslog
    start_at: beginning
    storage: file_storage/filelogs
    include_file_path: true
    include_file_name: true
    operators:
      - from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
        type: move
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: linux:varlog

  # Matches TA stanza: [monitor:///root/.bash_history] and [monitor:///home/*/.bash_history]
  # Uncomment to enable (disabled by default, as in the TA).
  filelog/bash_history:
     include:
       - /root/.bash_history
       - /home/*/.bash_history
     start_at: beginning
     storage: file_storage/filelogs
     include_file_path: true
     include_file_name: true
     operators:
       - from: attributes["log.file.path"]
         to: resource["com.splunk.source"]
         type: move
       - type: add
         field: resource["com.splunk.sourcetype"]
         value: linux:bash_history

  # To use the journald receiver, the collector service user must have permission to read the journal.
  # Add the collector service user to the systemd-journal group and restart the service:
  #   sudo usermod -aG systemd-journal splunk-otel-collector
  #   sudo systemctl restart splunk-otel-collector
  journald:
    start_at: end
    units:
      # --- CORE ---
      - systemd
      - systemd-journald

      # --- AUTHENTICATION ---
      - sshd
      - sudo

      # --- CRON ---
      - cron

      # Uncomment to enable additional units:
      # - ssh
      # - systemd-logind
      # - polkit
      # - dbus
      # - NetworkManager
      # - systemd-networkd
      # - systemd-resolved
      # - systemd-timesyncd
      # - unattended-upgrades
      # - apt-daily
      # - snapd

    operators:
      - type: copy
        from: body["_SYSTEMD_UNIT"]
        to: resource["com.splunk.source"]
        if: 'body["_SYSTEMD_UNIT"] != nil'
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: linux:journald

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}

  resourcedetection:
    detectors: [system, env]
    system:
      hostname_sources: ["os"]

  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  splunk_hec/logs:
    token: "${SPLUNK_LOGS_TOKEN}"
    endpoint: "${SPLUNK_LOGS_URL}"
    source: "otel"
    index: "${SPLUNK_LOGS_INDEX}"
    disable_compression: true
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
      max_interval: 30s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
    tls:
      insecure_skip_verify: false

service:
  extensions: [health_check, file_storage/filelogs]
  pipelines:
    logs/hec:
      receivers:
        - filelog/varlog
#        - filelog/etc
#        - filelog/bash_history
#        - journald
      processors:
        - memory_limiter
        - resourcedetection
        - batch
      exporters:
        - splunk_hec/logs