# Default configuration file for logs collection on Linux.
#
# If the collector is installed without the Linux installer script, the following
# environment variables are required to be manually defined or configured below:
# - SPLUNK_HEC_TOKEN: The Splunk HEC authentication token
# - SPLUNK_HEC_URL: The Splunk HEC endpoint URL, e.g. https://http-inputs-acme.splunkcloud.com/services/collector
# - SPLUNK_MEMORY_LIMIT_MIB: 90% of memory allocated
#
# The following environment variables are optional:
# - SPLUNK_FILE_STORAGE_EXTENSION_PATH: Path to directory used to store file offsets for filelog receivers,
#   allowing receivers to resume after a collector restart. Must be writable by the collector.
#   default: /var/lib/otelcol/filelogs

extensions:
  health_check:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:13133"
  file_storage/filelogs:
    directory: "${env:SPLUNK_FILE_STORAGE_EXTENSION_PATH:-/var/lib/otelcol/filelogs}"
    fsync: true
    compaction:
      on_start: true
      directory: /tmp/
    create_directory: true

receivers:
  filelog/etc:
    include:
      # Core system & networking
      - /etc/*.conf
      - /etc/resolv.conf
      - /etc/hosts
      - /etc/hostname
      - /etc/sysctl.conf

      # SSH & authentication
      - /etc/ssh/sshd_config
      - /etc/pam.d/**
      - /etc/login.defs

      # Users & privileges (metadata only, not secrets)
      - /etc/passwd
      - /etc/group
      - /etc/sudoers
      - /etc/sudoers.d/**

      # # Package & service configuration
      # - /etc/apt/apt.conf.d/**
      # - /etc/systemd/system/**
      # - /etc/systemd/*.conf

      # # Kernel & modules
      # - /etc/modprobe.d/**
      # - /etc/modules-load.d/**

    exclude:
      # Secrets / high-risk files
      - /etc/shadow
      - /etc/gshadow
      - /etc/**/shadow*
      - /etc/ssl/**
      - /etc/pki/**
    include_file_path: true
    include_file_name: true
    start_at: beginning
    force_flush_period: 500ms
    multiline:
      line_start_pattern: '^THIS_PATTERN_WILL_NEVER_MATCH_ANYTHING$'
    operators:
      - from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
        type: move
      - field: resource["com.splunk.sourcetype"]
        value: etc:file
        type: add

  filelog/logs:
    include:
      - /var/log/auth.log
      - /var/log/kern.log
    include_file_path: true
    include_file_name: true
    start_at: beginning
    storage: file_storage/filelogs
    force_flush_period: 500ms
    operators:
      - from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
        type: move
      - field: resource["com.splunk.sourcetype"]
        value: log:file
        type: add
      - id: parser-log
        type: regex_parser
        regex: ^(?P<time>[A-Z][a-z]{2}\s+\d{1,2}\s\d{2}:\d{2}:\d{2})\s(?P<host>\S+)\s(?P<process>[^:]+):\s?(?P<boottime>\[[\d.]+\])?\s(?P<log>.*)$
        # Uncomment and set 'location' to your local timezone to enable timestamp parsing.
        # A list of valid timezones can be found at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
        # timestamp:
        #   layout: "Jan _2 15:04:05"
        #   layout_type: gotime
        #   parse_from: attributes.time
        #   location: "America/New_York"

  filelog/varlog_minimal:
    include:
      # Standard Ubuntu logs
      - /var/log/daemon.log
      - /var/log/user.log
      - /var/log/cron.log

      # Generic *.log files (top level)
      - /var/log/*.log

      # Common subdirectories (one level deep)
      - /var/log/*/*.log

      # RHEL/CentOS specific
      - /var/log/*messages*
      - /var/log/*secure*
      - /var/log/*cron
      - /var/log/*log
      - /var/log/*mesg
      - /var/log/*acpid
      - /var/adm/*.log*
      - /var/adm/*log
      - /var/adm/*messages*

    exclude:
      # Binary or low-value logs
      - /var/log/lastlog
      - /var/log/wtmp
      - /var/log/btmp
      - /var/log/anaconda.syslog

    start_at: beginning
    storage: file_storage/filelogs
    include_file_path: true
    include_file_name: true
    operators:
      - from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
        type: move
      - field: resource["com.splunk.sourcetype"]
        value: varlog:file
        type: add

  journald:
    directory: /var/log/journal
    start_at: end
    units:
      # --- CORE ---
      - systemd
      - systemd-journald

      # --- AUTHENTICATION ---
      - sshd
      - sudo

      # --- CRON ---
      - cron

      # Uncomment to enable additional units:
      # - ssh
      # - systemd-logind
      # - polkit
      # - dbus
      # - NetworkManager
      # - systemd-networkd
      # - systemd-resolved
      # - systemd-timesyncd
      # - unattended-upgrades
      # - apt-daily
      # - snapd

    operators:
      - type: add
        field: resource["receiver"]
        value: journald
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: linux:journald
      - type: add
        field: resource["com.splunk.source"]
        value: journald

  # syslog:
  #   tcp:
  #     listen_address: "0.0.0.0:514"
  #   protocol: rfc5424
  #   operators:
  #     - type: add
  #       field: resource["receiver"]
  #       value: syslog
  #     - type: add
  #       field: resource["com.splunk.sourcetype"]
  #       value: linux:syslog
  #     - type: add
  #       field: resource["com.splunk.source"]
  #       value: syslog

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}

  resourcedetection:
    detectors: [system, env]
    system:
      hostname_sources: ["os"]

  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  splunk_hec/logs:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    source: "otel"
    index: "logs"
    disable_compression: true
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
      max_interval: 30s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
    tls:
      insecure_skip_verify: false

service:
  extensions: [health_check, file_storage/filelogs]
  pipelines:
    logs:
      receivers:
        - filelog/etc
        - filelog/logs
        - filelog/varlog_minimal
      processors:
        - memory_limiter
        - resourcedetection
        - batch
      exporters:
        - splunk_hec/logs
    logs/journald:
      receivers:
        - journald
      processors:
        - memory_limiter
        - resourcedetection
        - batch
      exporters:
        - splunk_hec/logs
    # logs/syslog:
    #   receivers:
    #     - syslog
    #   processors:
    #     - memory_limiter
    #     - resourcedetection
    #     - batch
    #   exporters:
    #     - splunk_hec/logs