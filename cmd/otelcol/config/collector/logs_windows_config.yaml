receivers:
  filelog/dhcp:
    include:
      - 'C:\Windows\System32\DHCP\DhcpSrvLog*'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: DhcpSrvLog

  filelog/windowsupdate_legacy:
    # For Windows 8 / Server 2008R2 / Server 2012 / Server 2012R2
    include:
      - 'C:\Windows\WindowsUpdate.log'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: WindowsUpdateLog

  filelog/windowsupdate_modern:
    # For Windows 10 / Server 2016 — generated by the PowerShell script below
    include:
      - 'C:\Program Files\SplunkUniversalForwarder\var\log\Splunk_TA_windows\WindowsUpdate.log'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: WindowsUpdateLog

  filelog/netlogon:
    include:
      - 'C:\Windows\debug\netlogon.log'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: MSAD:NT6:Netlogon

  filelog/firewall:
    include:
      - 'C:\Windows\System32\LogFiles\Firewall\*'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: WindowsFirewallLog

  filelog/dns_analytical:
    include:
      - 'C:\Program Files\SplunkUniversalForwarder\var\log\Splunk_TA_windows\AnalyticalDNS\dns_log.log'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: msdns:analytical

  #   --- GAP: dns.log (MonitorNoHandle) ------------------------------------
  #   [MonitorNoHandle://$WINDIR\System32\Dns\dns.log]
  #   The live DNS debug log is held open with an exclusive lock by the DNS
  #   service. filelogreceiver cannot reliably read exclusively locked files.
  #   Workaround: use a scheduled task to periodically copy dns.log to a
  #   staging path, then monitor that path with filelog.

  filelog/dns_debug:
    include:
      - 'C:\dns_log_copy\dns.log'
    start_at: beginning
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.path"]
        to: resource["com.splunk.source"]
      - type: add
        field: resource["com.splunk.sourcetype"]
        value: MSAD:NT6:DNS



processors:
  batch:
  resourcedetection:
    detectors: [ system, env ]
    system:
      hostname_sources: [ "os" ]

exporters:
  splunk_hec:
    endpoint: "https://localhost:8088/services/collector"
    token: "896b5212-3ba8-4c9e-9ba8-a6f9423ff423"
    index: otel
    tls:
      insecure_skip_verify: true

extensions:
  # Storage extension for storing file_log checkpoints.
  # Checkpoints allow the receiver to pick up where it left off in the case of a
  # collector restart.
  file_storage/filelogs:
    compaction:
      on_start: true
      directory: /tmp/
    create_directory: true

service:
  extensions: [file_storage/filelogs]
  pipelines:
    logs/dhcp:
      receivers: [filelog/dhcp]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]

    logs/windowsupdate:
      receivers: [filelog/windowsupdate_legacy, filelog/windowsupdate_modern]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]

    logs/netlogon:
      receivers: [filelog/netlogon]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]

    logs/firewall:
      receivers: [filelog/firewall]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]

    logs/dns_analytical:
      receivers: [filelog/dns_analytical]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]

    logs/dns_debug:
      receivers: [filelog/dns_debug]
      processors: [batch, resourcedetection]
      exporters: [splunk_hec]