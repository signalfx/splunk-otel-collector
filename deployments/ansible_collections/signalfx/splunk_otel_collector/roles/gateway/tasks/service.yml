---
# Service management tasks for gateway role

- name: Ensure systemd override directory exists
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ otel_gateway_service_name }}.service.d"
    state: directory
    mode: '0755'

- name: Template systemd service override
  ansible.builtin.template:
    src: gateway.service.j2
    dest: "/etc/systemd/system/{{ otel_gateway_service_name }}.service.d/override.conf"
    mode: '0644'
  notify:
    - Reload systemd daemon
    - restart gateway collector

- name: Enable and start gateway collector service
  ansible.builtin.systemd:
    name: "{{ otel_gateway_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: start_gateway_service
