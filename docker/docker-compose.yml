services:
  # Apache image for apache discovery test
  apache:
    image: quay.io/splunko11ytest/apache:latest
    profiles:
      - integration-test-apache-discovery
    build: ./apache
    ports:
      - "18080:80"
  envoy:
    image: quay.io/splunko11ytest/envoy:latest
    profiles:
      - integration-test-envoy-discovery
    build: ./envoy
    ports:
      - "9901:9901"
  # httpd image for prometheus-exporter test
  httpd:
    image: quay.io/splunko11ytest/httpd:latest
    profiles:
      - smartagent
    build: ./httpd
    ports:
      - "8000:80"
  # httpd_basicauth image for lightprometheus test
  httpd_basicauth:
    image: quay.io/splunko11ytest/httpd_basicauth:latest
    profiles:
      - integration
      - smartagent
    build: ./httpd_basicauth
    ports:
      - "8001:80"
  # new-style kafka
  kafka-kraft-single:
    image: apache/kafka:3.7.0
    # following configuration is taken DIRECTLY from
    # kafka examples in the upstream apache (licensed + hosted) repo
    # Thanks all from the Kafka team!
    # https://github.com/apache/kafka/blob/3.7.0/docker/examples/jvm/single-node/plaintext/docker-compose.yml
    hostname: broker
    container_name: broker
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    profiles:
      - integration-test-kafka-metrics-discovery
  kong:
    image: quay.io/splunko11ytest/kong:latest
    profiles:
      - integration
    build: ./kong
    ports:
      - "18001:8001"
  mongodb:
    image: quay.io/splunko11ytest/mongodb:latest
    profiles:
      - integration-test-mongodb-discovery
    build:
      context: ./mongodb
      args:
        MONGODB_VERSION: ${MONGODB_VERSION}
    ports:
      - "27017:27017"
  mysql:
    image: quay.io/splunko11ytest/mysql:latest
    profiles:
      - integration
      - integration-test-mysql-discovery
    build: ./mysql
    ports:
      - "3306:3306"
  nginx:
    image: quay.io/splunko11ytest/nginx:latest
    profiles:
      - integration-test-nginx-discovery
    build: ./nginx
    ports:
      - "8123:80"
  oracle:
    image: quay.io/splunko11ytest/oracle:latest
    profiles:
      - integration # there is no integration test for oracle upstream
      - integration-test-oracledb-discovery
    build: ./oracle
    ports:
      - "1521:1521"
  rabbitmq:
    image: rabbitmq:3.13-management
    profiles:
      - integration-test-rabbitmq-discovery
    environment:
      RABBITMQ_DEFAULT_USER: splunk.discovery.default
      RABBITMQ_DEFAULT_PASS: splunk.discovery.default
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
  redis_server:
    image: quay.io/splunko11ytest/redis_server:latest
    profiles:
      - integration-test-redis-discovery
    build: ./redis_server
    ports:
      - "6379:6379"
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.33.2
    profiles:
      - integration-test-weaviate-discovery
    ports:
      - "2112:2112"
    environment:
      PROMETHEUS_MONITORING_ENABLED: "true"
