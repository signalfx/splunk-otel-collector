config_sources:
    env:
        defaults:
            METRICS_TO_EXCLUDE: []
exporters:
    otlp_http:
        auth:
            authenticator: headers_setter
        headers:
            X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
        traces_endpoint: ${SPLUNK_INGEST_URL}/v2/trace/otlp
    signalfx:
        access_token: ${SPLUNK_ACCESS_TOKEN}
        correlation: null
        realm: ${SPLUNK_REALM}
    splunk_hec:
        endpoint: ${SPLUNK_HEC_URL}
        profiling_data_enabled: false
        source: otel
        sourcetype: otel
        token: ${SPLUNK_HEC_TOKEN}
    splunk_hec/profiling:
        endpoint: ${SPLUNK_INGEST_URL}/v1/log
        log_data_enabled: false
        token: ${SPLUNK_ACCESS_TOKEN}
extensions:
    headers_setter:
        headers:
            - action: upsert
              default_value: ${SPLUNK_ACCESS_TOKEN}
              from_context: X-SF-TOKEN
              key: X-SF-TOKEN
    health_check:
        endpoint: 0.0.0.0:13133
    http_forwarder:
        egress:
            endpoint: https://api.${SPLUNK_REALM}.observability.splunkcloud.com
        ingress:
            endpoint: 0.0.0.0:6060
    http_forwarder/opamp_splunk_o11y:
        egress:
            endpoint: ${SPLUNK_INGEST_URL}
        ingress:
            endpoint: ${SPLUNK_LISTEN_INTERFACE}:4320
    opamp/splunk_o11y:
        server:
            http:
                endpoint: ${SPLUNK_INGEST_URL}/v1/opamp
                headers:
                    X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
                polling_interval: 30s
    zpages:
        endpoint: 0.0.0.0:55679
        expvar:
            enabled: true
processors:
    batch:
        metadata_keys:
            - X-SF-Token
    filter:
        metrics:
            exclude:
                match_type: regexp
                metric_names: ${env:METRICS_TO_EXCLUDE}
    memory_limiter:
        check_interval: 2s
        limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}
    resourcedetection:
        detectors:
            - ecs
        override: false
    resourcedetection/internal:
        detectors:
            - ecs
        override: true
receivers:
    awsecscontainermetrics: null
    fluent_forward:
        endpoint: 0.0.0.0:8006
    host_metrics:
        collection_interval: 10s
        scrapers:
            cpu: null
            disk: null
            load: null
            memory: null
            network: null
            paging: null
            processes: null
    jaeger:
        protocols:
            grpc:
                endpoint: 0.0.0.0:14250
            thrift_http:
                endpoint: 0.0.0.0:14268
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
    prometheus/internal:
        config:
            scrape_configs:
                - job_name: otel-collector
                  metric_relabel_configs:
                    - action: drop
                      regex: promhttp_metric_handler_errors.*
                      source_labels:
                        - __name__
                    - action: drop
                      regex: otelcol_processor_batch_.*
                      source_labels:
                        - __name__
                  scrape_interval: 10s
                  static_configs:
                    - targets:
                        - 0.0.0.0:8888
    zipkin:
        endpoint: 0.0.0.0:9411
service:
    extensions:
        - headers_setter
        - health_check
        - http_forwarder
        - http_forwarder/opamp_splunk_o11y
        - opamp/splunk_o11y
        - zpages
    pipelines:
        logs:
            exporters:
                - splunk_hec
                - splunk_hec/profiling
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - otlp
                - fluent_forward
        metrics:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
                - filter
                - resourcedetection
            receivers:
                - host_metrics
                - otlp
                - awsecscontainermetrics
        metrics/internal:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
                - filter
                - resourcedetection/internal
            receivers:
                - prometheus/internal
        traces:
            exporters:
                - otlp_http
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - jaeger
                - otlp
                - zipkin
    telemetry:
        logs:
            level: ${env:SPLUNK_COLLECTOR_LOG_LEVEL:-info}
        metrics:
            readers:
                - pull:
                    exporter:
                        prometheus:
                            host: 127.0.0.1
                            port: 8888
