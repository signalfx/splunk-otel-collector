exporters:
    debug:
        verbosity: detailed
    file:
        path: ./filename.json
    jaeger:
        endpoint: jaeger-all-in-one:14250
        tls:
            insecure: true
    otlp_grpc:
        auth:
            authenticator: headers_setter
        endpoint: otelcol2:4317
    otlp_http:
        auth:
            authenticator: headers_setter
        compression: gzip
        endpoint: otelcol2:4318
        headers:
            X-SF-TOKEN: ${SPLUNK_ACCESS_TOKEN}
    prometheus:
        const_labels:
            another label: spaced value
            label1: value1
        endpoint: 1.2.3.4:1234
        namespace: test-space
        send_timestamps: true
    prometheusremotewrite:
        endpoint: http://some.url:9411/api/prom/push
    signalfx:
        access_token: ${SPLUNK_ACCESS_TOKEN}
        realm: ${SPLUNK_REALM}
    splunk_hec:
        disable_compression: false
        endpoint: https://${SPLUNK_ENDPOINT}:8088/services/collector
        index: metrics
        insecure_skip_verify: false
        max_connections: 200
        profiling_data_enabled: false
        source: otel
        sourcetype: otel
        timeout: 10s
        token: ${SPLUNK_HEC_TOKEN}
    splunk_hec/profiling:
        endpoint: https://ingest.${SPLUNK_REALM}.observability.splunkcloud.com/v1/log
        log_data_enabled: false
        token: ${SPLUNK_ACCESS_TOKEN}
    zipkin:
        endpoint: http://some.url:9411/api/v2/spans
        tls:
            insecure: true
extensions:
    headers_setter:
        headers:
            - action: upsert
              default_value: ${SPLUNK_ACCESS_TOKEN}
              from_context: X-SF-TOKEN
              key: X-SF-TOKEN
    health_check:
        endpoint: 0.0.0.0:13133
    host_observer: null
    http_forwarder:
        egress:
            endpoint: https://api.${SPLUNK_REALM}.observability.splunkcloud.com
        ingress:
            endpoint: 0.0.0.0:6060
    http_forwarder/opamp_splunk_o11y:
        egress:
            endpoint: https://ingest.${SPLUNK_REALM}.observability.splunkcloud.com
        ingress:
            endpoint: 0.0.0.0:4320
    k8s_observer: null
    opamp/splunk_o11y:
        server:
            http:
                endpoint: https://ingest.${SPLUNK_REALM}.observability.splunkcloud.com/v1/opamp
                headers:
                    X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
                polling_interval: 30s
    pprof: null
    zpages:
        expvar:
            enabled: true
processors:
    attributes:
        actions:
            - action: insert
              key: environment
              value: test
    attributes/example:
        actions:
            - action: delete
              key: db.statement
            - action: extract
              key: http.url
              pattern: ^(?P<http_protocol>.*):\/\/(?P<http_domain>.*)\/(?P<http_path>.*)(\?|\&)(?P<http_query_params>.*)
            - action: hash
              key: email
            - action: insert
              key: build_num
              value: 1.5.7
            - action: update
              from_attribute: foo
              key: bar
            - action: upsert
              key: region
              value: planet-earth
    batch:
        metadata_keys:
            - X-SF-Token
    filter/1:
        metrics:
            exclude:
                match_type: strict
                metric_names:
                    - hello_world
                    - hello/world
            include:
                match_type: regexp
                metric_names:
                    - prefix/.*
                    - prefix_.*
                resource_attributes:
                    - Key: container.name
                      Value: app_container_1
    memory_limiter:
        check_interval: 2s
        limit_mib: 1800
    resource:
        attributes:
            - action: upsert
              key: cloud.zone
              value: zone-1
            - action: insert
              from_attribute: k8s-cluster
              key: k8s.cluster.name
            - action: delete
              key: redundant-attribute
    resourcedetection/internal:
        detectors:
            - gcp
            - ecs
            - ec2
            - azure
            - system
        override: true
    span/from_attributes:
        name:
            from_attributes:
                - db.svc
                - operation
            separator: '::'
    span/to_attributes:
        name:
            to_attributes:
                rules:
                    - ^\/api\/v1\/document\/(?P<documentId>.*)\/update$
receivers:
    file_log:
        exclude:
            - /var/log/*lastlog*
            - /var/log/*anaconda.syslog*
        include:
            - /Library/Logs/*
            - /var/log/*.log*
            - /var/log/*log
            - /var/log/*messages*
            - /var/log/*secure*
            - /var/log/*auth*
            - /var/log/*mesg
            - /var/log/*cron
            - /var/log/*acpid
            - /var/log/*.out*
            - /var/adm/*.log*
            - /var/adm/*log
            - /var/adm/*messages*
            - /etc/*.conf*
            - /etc/*.cfg*
            - /etc/*config
            - /etc/*.ini*
            - /etc/*.init*
            - /etc/*.cf*
            - /etc/*.cnf*
            - /etc/*shrc
            - /etc/ifcfg*
            - /etc/*.profile*
            - /etc/*.rc*
            - /etc/*.rules*
            - /etc/*.tab*
            - /etc/*tab
            - /etc/*.login*
            - /etc/*policy
            - /root/.bash_history
            - /home/*/.bash_history
        include_file_name: false
        include_file_path: true
    fluent_forward:
        endpoint: 0.0.0.0:8006
    host_metrics:
        collection_interval: 10s
        scrapers:
            cpu: null
            disk: null
            filesystem: null
            load: null
            memory: null
            network: null
            paging: null
            processes: null
    jaeger:
        protocols:
            grpc:
                endpoint: 0.0.0.0:14250
            thrift_binary:
                endpoint: 0.0.0.0:6832
            thrift_compact:
                endpoint: 0.0.0.0:6831
            thrift_http:
                endpoint: 0.0.0.0:14268
    k8s_cluster: null
    kafka:
        protocol_version: 2.0.0
    kubeletstats:
        auth_type: serviceAccount
        insecure_skip_verify: true
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
    prometheus/internal:
        config:
            scrape_configs:
                - job_name: otel-collector
                  metric_relabel_configs:
                    - action: drop
                      regex: promhttp_metric_handler_errors.*
                      source_labels:
                        - __name__
                    - action: drop
                      regex: otelcol_processor_batch_.*
                      source_labels:
                        - __name__
                  scrape_interval: 10s
                  static_configs:
                    - targets:
                        - 0.0.0.0:8888
    prometheus_simple: null
    scripted_inputs/bandwidth:
        collection_interval: 60s
        script_name: bandwidth
        source: bandwidth
        sourcetype: bandwidth
    scripted_inputs/cpu:
        collection_interval: 30s
        script_name: cpu
        source: cpu
        sourcetype: cpu
    scripted_inputs/df:
        collection_interval: 10s
        script_name: df
        source: df
        sourcetype: df
    scripted_inputs/hardware:
        collection_interval: 36000s
        script_name: hardware
        source: hardware
        sourcetype: hardware
    scripted_inputs/interfaces:
        collection_interval: 60s
        script_name: interfaces
        source: interfaces
        sourcetype: interfaces
    scripted_inputs/iostat:
        collection_interval: 60s
        script_name: iostat
        source: iostat
        sourcetype: iostat
    scripted_inputs/lastlog:
        collection_interval: 300s
        script_name: lastlog
        source: lastlog
        sourcetype: lastlog
    scripted_inputs/lsof:
        collection_interval: 600s
        script_name: lsof
        source: lsof
        sourcetype: lsof
    scripted_inputs/netstat:
        collection_interval: 60s
        script_name: netstat
        source: netstat
        sourcetype: netstat
    scripted_inputs/nfsiostat:
        collection_interval: 60s
        script_name: nfsiostat
        source: nfsiostat
        sourcetype: nfsiostat
    scripted_inputs/openPorts:
        collection_interval: 300s
        script_name: openPorts
        source: openPorts
        sourcetype: openPorts
    scripted_inputs/openPortsEnhanced:
        collection_interval: 3600s
        script_name: openPortsEnhanced
        source: openPortsEnhanced
        sourcetype: openPortsEnhanced
    scripted_inputs/package:
        collection_interval: 3600s
        script_name: package
        source: package
        sourcetype: package
    scripted_inputs/passwd:
        collection_interval: 3600s
        script_name: passwd
        source: passwd
        sourcetype: passwd
    scripted_inputs/protocol:
        collection_interval: 60s
        script_name: protocol
        source: protocol
        sourcetype: protocol
    scripted_inputs/ps:
        collection_interval: 30s
        script_name: ps
        source: ps
        sourcetype: ps
    scripted_inputs/rlog:
        collection_interval: 60s
        script_name: rlog
        source: rlog
        sourcetype: rlog
    scripted_inputs/selinuxChecker:
        collection_interval: 3600s
        script_name: selinuxChecker
        source: selinuxChecker
        sourcetype: selinuxChecker
    scripted_inputs/service:
        collection_interval: 3600s
        script_name: service
        source: service
        sourcetype: service
    scripted_inputs/sshdChecker:
        collection_interval: 3600s
        script_name: sshdChecker
        source: sshdChecker
        sourcetype: sshdChecker
    scripted_inputs/time:
        collection_interval: 21600s
        script_name: time
        source: time
        sourcetype: time
    scripted_inputs/top:
        collection_interval: 60s
        script_name: top
        source: top
        sourcetype: top
    scripted_inputs/update:
        collection_interval: 86400s
        script_name: update
        source: update
        sourcetype: update
    scripted_inputs/uptime:
        collection_interval: 86400s
        script_name: uptime
        source: uptime
        sourcetype: uptime
    scripted_inputs/usersWithLoginPrivs:
        collection_interval: 3600s
        script_name: usersWithLoginPrivs
        source: usersWithLoginPrivs
        sourcetype: usersWithLoginPrivs
    scripted_inputs/version:
        collection_interval: 86400s
        script_name: version
        source: version
        sourcetype: version
    scripted_inputs/vmstat:
        collection_interval: 60s
        script_name: vmstat
        source: vmstat
        sourcetype: vmstat
    scripted_inputs/vsftpdChecker:
        collection_interval: 86400s
        script_name: vsftpdChecker
        source: vsftpdChecker
        sourcetype: vsftpdChecker
    scripted_inputs/who:
        collection_interval: 150s
        script_name: who
        source: who
        sourcetype: who
    splunk_hec: null
    zipkin:
        endpoint: 0.0.0.0:9411
service:
    extensions:
        - headers_setter
        - health_check
        - http_forwarder
        - http_forwarder/opamp_splunk_o11y
        - opamp/splunk_o11y
        - zpages
    pipelines:
        logs:
            exporters:
                - splunk_hec
                - splunk_hec/profiling
            processors:
                - memory_limiter
                - batch
            receivers:
                - fluent_forward
                - otlp
                - scripted_inputs/bandwidth
                - scripted_inputs/cpu
                - scripted_inputs/df
                - scripted_inputs/hardware
                - scripted_inputs/interfaces
                - scripted_inputs/iostat
                - scripted_inputs/lastlog
                - scripted_inputs/lsof
                - scripted_inputs/netstat
                - scripted_inputs/nfsiostat
                - scripted_inputs/openPorts
                - scripted_inputs/openPortsEnhanced
                - scripted_inputs/package
                - scripted_inputs/passwd
                - scripted_inputs/protocol
                - scripted_inputs/ps
                - scripted_inputs/rlog
                - scripted_inputs/selinuxChecker
                - scripted_inputs/service
                - scripted_inputs/sshdChecker
                - scripted_inputs/time
                - scripted_inputs/top
                - scripted_inputs/update
                - scripted_inputs/uptime
                - scripted_inputs/usersWithLoginPrivs
                - scripted_inputs/version
                - scripted_inputs/vmstat
                - scripted_inputs/vsftpdChecker
                - scripted_inputs/who
        metrics:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
            receivers:
                - otlp
        metrics/internal:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
                - resourcedetection/internal
            receivers:
                - prometheus/internal
        traces:
            exporters:
                - otlp_http
            processors:
                - memory_limiter
                - batch
            receivers:
                - jaeger
                - otlp
                - zipkin
    telemetry:
        logs:
            level: ${env:SPLUNK_COLLECTOR_LOG_LEVEL:-info}
        metrics:
            readers:
                - pull:
                    exporter:
                        prometheus:
                            host: 127.0.0.1
                            port: 8888
