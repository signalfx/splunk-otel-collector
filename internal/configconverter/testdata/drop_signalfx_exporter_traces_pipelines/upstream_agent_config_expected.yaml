exporters:
    debug:
        verbosity: detailed
    otlp_grpc/gateway:
        auth:
            authenticator: headers_setter
        endpoint: ${SPLUNK_GATEWAY_URL}:4317
        tls:
            insecure: true
    otlp_http:
        auth:
            authenticator: headers_setter
        headers:
            X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
        traces_endpoint: ${SPLUNK_INGEST_URL}/v2/trace/otlp
    otlp_http/entities:
        auth:
            authenticator: headers_setter
        headers:
            X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
        logs_endpoint: ${SPLUNK_INGEST_URL}/v3/event
    signalfx:
        access_token: ${SPLUNK_ACCESS_TOKEN}
        api_url: ${SPLUNK_API_URL}
        correlation: null
        ingest_url: ${SPLUNK_INGEST_URL}
        sync_host_metadata: true
    splunk_hec/profiling:
        endpoint: https://ingest.${SPLUNK_REALM}.observability.splunkcloud.com/v1/log
        log_data_enabled: false
        token: ${SPLUNK_ACCESS_TOKEN}
extensions:
    headers_setter:
        headers:
            - action: upsert
              default_value: ${SPLUNK_ACCESS_TOKEN}
              from_context: X-SF-TOKEN
              key: X-SF-TOKEN
    health_check:
        endpoint: 0.0.0.0:13133
    http_forwarder:
        egress:
            endpoint: ${SPLUNK_API_URL}
        ingress:
            endpoint: 0.0.0.0:6060
    http_forwarder/opamp_splunk_o11y:
        egress:
            endpoint: ${SPLUNK_INGEST_URL}
        ingress:
            endpoint: ${SPLUNK_LISTEN_INTERFACE}:4320
    opamp/splunk_o11y:
        server:
            http:
                endpoint: ${SPLUNK_INGEST_URL}/v1/opamp
                headers:
                    X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
                polling_interval: 30s
    zpages:
        expvar:
            enabled: true
processors:
    batch:
        metadata_keys:
            - X-SF-Token
    memory_limiter:
        check_interval: 2s
        limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}
    resourcedetection:
        detectors:
            - gcp
            - ecs
            - ec2
            - azure
            - system
        override: true
receivers:
    fluentforward:
        endpoint: 127.0.0.1:8006
    hostmetrics:
        collection_interval: 10s
        scrapers:
            cpu: null
            disk: null
            filesystem: null
            load: null
            memory: null
            network: null
            paging: null
            processes: null
    jaeger:
        protocols:
            grpc:
                endpoint: 0.0.0.0:14250
            thrift_binary:
                endpoint: 0.0.0.0:6832
            thrift_compact:
                endpoint: 0.0.0.0:6831
            thrift_http:
                endpoint: 0.0.0.0:14268
    nop: null
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
    prometheus/internal:
        config:
            scrape_configs:
                - job_name: otel-collector
                  metric_relabel_configs:
                    - action: drop
                      regex: promhttp_metric_handler_errors.*
                      source_labels:
                        - __name__
                    - action: drop
                      regex: otelcol_processor_batch_.*
                      source_labels:
                        - __name__
                  scrape_interval: 10s
                  static_configs:
                    - targets:
                        - 0.0.0.0:8888
    zipkin:
        endpoint: 0.0.0.0:9411
service:
    extensions:
        - headers_setter
        - health_check
        - http_forwarder
        - http_forwarder/opamp_splunk_o11y
        - opamp/splunk_o11y
        - zpages
    pipelines:
        logs:
            exporters:
                - splunk_hec/profiling
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - otlp
        logs/entities:
            exporters:
                - otlp_http/entities
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - nop
        metrics:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - hostmetrics
                - otlp
        metrics/internal:
            exporters:
                - signalfx
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - prometheus/internal
        traces:
            exporters:
                - otlp_http
            processors:
                - memory_limiter
                - batch
                - resourcedetection
            receivers:
                - jaeger
                - otlp
                - zipkin
    telemetry:
        logs:
            level: ${env:SPLUNK_COLLECTOR_LOG_LEVEL:-info}
        metrics:
            readers:
                - pull:
                    exporter:
                        prometheus:
                            host: 127.0.0.1
                            port: 8888
