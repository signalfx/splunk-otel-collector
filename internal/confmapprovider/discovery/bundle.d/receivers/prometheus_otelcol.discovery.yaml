##############################################################################################
#                               Do not edit manually!                                        #
# All changes must be made to associated .yaml metadata file before running 'make bundle.d'. #
##############################################################################################
prometheus/otelcol:
  enabled: false
  rule:
    host_observer: type == "hostport" and command contains "otelcol"
  config:
    default:
      config:
        scrape_configs:
          - job_name: 'otelcol'
            scrape_interval: 10s
            static_configs:
              - targets: ['`endpoint`']
