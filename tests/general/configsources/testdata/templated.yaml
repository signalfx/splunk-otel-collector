config_sources:
  include:
extensions:
  zpages:
    expvar:
      enabled: true
receivers:
  host_metrics:
    scrapers:
      filesystem:
      memory:
      network:
      cpu:
      disk:
    collection_interval: ${include:./testdata/collection_interval_scalar}
processors:
  resourcedetection:
    detectors: [ system ]
exporters:
  otlp_grpc: ${include:./testdata/exporter_component}
service: ${include:./testdata/service_template_component?my_receivers=[host_metrics]&my_processors=[resourcedetection]&my_exporters=[otlp_grpc]}
