prometheus/test:
  enabled: false
  rule:
    docker_observer: type == "container" and labels['test.id'] == '${SPLUNK_TEST_ID}' and port == 9090
  config:
    default:
      config:
        scrape_configs:
          - job_name: prometheus
            scrape_interval: invalid
            scrape_timeout: invalid
    docker_observer:
      config:
        scrape_configs:
          - job_name: 'prometheus'
            scrape_interval: 1s
            scrape_timeout: 1s
            static_configs:
              - targets: ['`endpoint`']
                labels:
                  label_one: '${env:LABEL_ONE_VALUE}'
                  label_two: ${LABEL_TWO_VALUE}
