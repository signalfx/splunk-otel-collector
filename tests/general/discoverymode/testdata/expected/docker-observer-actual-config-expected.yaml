extensions:
  config_source_telemetry: {}
  docker_observer:
    endpoint: "{{ .DockerEndpoint }}"
  zpages:
    endpoint: 0.0.0.0:55679
    expvar:
      enabled: true
exporters:
  otlp_grpc:
    endpoint: "{{ .OTLPEndpoint }}"
    tls:
      insecure: true
processors:
  filter:
    metrics:
      include:
        match_type: strict
        metric_names: [prometheus_tsdb_exemplar_exemplars_in_storage]
receivers:
  discovery/docker_observer:
    embed_receiver_config: true
    receivers:
      prometheus/test:
        config:
          config:
            scrape_configs:
              - job_name: prometheus
                scrape_interval: 1s
                scrape_timeout: 1s
                static_configs:
                  - targets: ['`endpoint`']
                    labels:
                      label_one: actual.label.one.value
                      label_two: actual.label.two.value
        rule: type == "container" and labels['test.id'] == '{{ .TestID }}' and port == 9090
    watch_observers: [docker_observer]
service:
  extensions: [zpages, docker_observer, config_source_telemetry]
  pipelines:
    metrics:
      receivers: [discovery/docker_observer]
      exporters: [otlp_grpc]
      processors: [filter]
  telemetry:
    metrics:
      level: none
    resource:
      attributes:
        - name: splunk_autodiscovery
          value: "true"