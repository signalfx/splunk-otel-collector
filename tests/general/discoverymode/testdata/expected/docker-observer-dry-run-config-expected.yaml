extensions:
  docker_observer:
    endpoint: ${DOCKER_DOMAIN_SOCKET}
  zpages:
    endpoint: "0.0.0.0:55679"
    expvar:
      enabled: true
exporters:
  otlp_grpc:
    endpoint: ${OTLP_ENDPOINT}
    tls:
      insecure: true
processors:
  filter:
    metrics:
      include:
        match_type: strict
        metric_names: [prometheus_tsdb_exemplar_exemplars_in_storage]
receivers:
  discovery/docker_observer:
    embed_receiver_config: true
    receivers:
      prometheus/test:
        config:
          config:
            scrape_configs:
              - job_name: prometheus
                scrape_interval: 1s
                scrape_timeout: 1s
                static_configs:
                  - targets: [ '`endpoint`' ]
                    labels:
                      label_one: ${env:LABEL_ONE_VALUE}
                      label_two: ${LABEL_TWO_VALUE}
        rule: type == "container" and labels['test.id'] == '${SPLUNK_TEST_ID}' and port == 9090
    watch_observers: [docker_observer]
service:
  extensions: [zpages, docker_observer]
  pipelines:
    metrics:
      exporters: [otlp_grpc]
      processors: [filter]
      receivers: [discovery/docker_observer]
  telemetry:
    metrics:
      level: none
    resource:
      attributes:
        - name: splunk_autodiscovery
          value: "true"