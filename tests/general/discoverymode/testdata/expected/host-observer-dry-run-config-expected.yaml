extensions:
  host_observer:
    refresh_interval: ${REFRESH_INTERVAL}
  zpages:
    endpoint: 0.0.0.0:55679
    expvar:
      enabled: true
exporters:
  otlp_grpc:
    endpoint: ${OTLP_ENDPOINT}
    tls:
      insecure: true
processors:
  filter:
    metrics:
      include:
        match_type: strict
        metric_names: [otelcol_process_uptime]
receivers:
  discovery/host_observer:
    watch_observers: [host_observer]
    embed_receiver_config: true
    receivers:
      prometheus/test:
        rule: type == "hostport" and command contains "otelcol" and port == ${INTERNAL_PROMETHEUS_PORT}
        config:
          scrape_configs:
            - scrape_interval: 1s
              scrape_timeout: 1s
              static_configs:
                - labels:
                    label_one: ${env:LABEL_ONE_VALUE}
                    label_two: ${LABEL_TWO_VALUE}
service:
  telemetry:
    resource:
      attributes:
        - name: splunk_autodiscovery
          value: "true"
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: localhost
                port: ${INTERNAL_PROMETHEUS_PORT}
                without_scope_info: true
                without_type_suffix: true
                without_units: true
  extensions: [zpages, host_observer]
  pipelines:
    metrics:
      receivers: [discovery/host_observer]
      exporters: [otlp_grpc]
      processors: [filter]

