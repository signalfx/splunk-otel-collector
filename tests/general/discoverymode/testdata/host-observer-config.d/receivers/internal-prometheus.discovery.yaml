prometheus/test:
  rule:
    host_observer: type == "hostport" and command contains "otelcol" and port == ${INTERNAL_PROMETHEUS_PORT}
  config:
    default:
      config:
        scrape_configs:
          - job_name: prometheus
            scrape_interval: invalid
            scrape_timeout: invalid
            static_configs:
              - targets: ["0.0.0.0:9090"]
                labels:
                  label_one: ${LABEL_ONE_VALUE}
    host_observer:
      config:
        scrape_configs:
          - scrape_interval: 1s
            scrape_timeout: 1s
            static_configs:
              - labels:
                  label_two: ${LABEL_TWO_VALUE}
