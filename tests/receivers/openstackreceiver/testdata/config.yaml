receivers:
  openstack:
    auth_url: "http://localhost/identity/v3"
    username: "admin"
    password: "secret"
    project_name: "demo"
    project_domain_id: "default"
    user_domain_id: "default"
    collection_interval: 10s
    http_timeout: 30s

processors:
  batch:

exporters:
  otlp_grpc:
    endpoint: "${OTLP_ENDPOINT}"
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers:
        - openstack
      processors: [batch]
      exporters: [otlp_grpc]
