global
  log stdout format raw local0

defaults
  log global
  timeout connect 250ms
  timeout client 10s
  timeout server 10s

# OTLP HTTP Protocol (gRPC-upgraded HTTP/2)
frontend otlp_http_in
  mode http
  bind *:4318
  default_backend collector_otlp_http
  option httplog
  option forwardfor

backend collector_otlp_http
  mode http
  balance roundrobin
  # OTL-4173 repro: load balancer health uses collector health_check extension,
  # while data traffic is still forwarded to the OTLP HTTP receiver.
  option httpchk
  http-check connect port 13133
  http-check send meth GET uri / ver HTTP/1.1 hdr host otelcollector
  http-check expect status 200
  server otelcollector otelcollector:4318 check inter 30s fastinter 1s downinter 1s fall 30 rise 1

# OTLP gRPC Protocol
frontend otlp_grpc_in
  mode tcp
  bind *:4317
  default_backend collector_otlp_grpc

backend collector_otlp_grpc
  mode tcp
  balance roundrobin
  # OTL-4173 repro: probe health_check extension on 13133 for the OTLP gRPC backend.
  option tcp-check
  tcp-check connect port 13133
  tcp-check send GET\ /\ HTTP/1.1\r\n
  tcp-check send Host:\ otelcollector\r\n
  tcp-check send Connection:\ close\r\n
  tcp-check send \r\n
  tcp-check expect rstring HTTP/1\.[01]\ 200
  server otelcollector otelcollector:4317 check inter 30s fastinter 1s downinter 1s fall 30 rise 1

# HAProxy Stats
listen stats
  mode http
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
  stats show-legends
